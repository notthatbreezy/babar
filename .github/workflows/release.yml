name: Release crates

on:
  workflow_dispatch:
    inputs:
      version:
        description: Crate version to publish
        required: true
        default: "0.2.0"

permissions:
  contents: read

concurrency:
  group: crates-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: cargo-publish
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      RELEASE_VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify workspace version
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          cargo_toml = pathlib.Path("Cargo.toml")
          workspace = tomllib.loads(cargo_toml.read_text())["workspace"]["package"]
          actual = workspace["version"]
          expected = os.environ["RELEASE_VERSION"]
          if actual != expected:
              raise SystemExit(f"workspace version {actual} does not match requested release {expected}")
          PY

      - name: Publish babar-macros
        run: cargo publish --locked -p babar-macros

      - name: Publish babar
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            if cargo publish --locked -p babar >publish.log 2>&1; then
              cat publish.log
              rm -f publish.log
              exit 0
            fi

            if grep -Fq 'no matching package named `babar-macros` found' publish.log; then
              echo "babar-macros is not visible in the crates.io index yet (attempt ${attempt}/30); retrying..."
              sleep 10
              continue
            fi

            cat publish.log
            exit 1
          done

          cat publish.log
          exit 1
